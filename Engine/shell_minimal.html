<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;700&display=swap" rel="stylesheet">
    <title>Swiftblade Web</title>
    <style>
      body {
        font-family: 'Red Hat Text', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
 
      #spinner strong {
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
      
      .emscripten { padding-right: 0; display: block; }
      textarea.emscripten { font-family: monospace; width: 80%; }
      div.emscripten { text-align: center; }
      /* the canvas *must not* have any border or padding, or mouse coords will be wrong */
      canvas.emscripten { border: 0px none; background-color: black; }
 
      .spinner {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 5px solid #d0d0d0;
        border-top: 5px solid #808080;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      [hidden] { display: none !important; }
 
      /* Reset default <figure> margins, center contents */
      #spinner {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
 
      progress {
        -webkit-appearance: none;
        appearance: none;
        width: 150px;
        height: 8px;
        border: none;
        border-radius: 4px;
        overflow: hidden;
        background: #f0f0f0;        /* fallback / Firefox track */
      }
 
      progress::-webkit-progress-bar {
        background: #f0f0f0;        /* track color (WebKit/Blink) */
        border-radius: 4px;
      }
 
      progress::-webkit-progress-value {
        background-color: #808080;
        background-image: linear-gradient(120deg, #d0d0d0, #808080);
        border-radius: 0;
      }
 
      progress::-moz-progress-bar {
        background-color: #808080;
        background-image: linear-gradient(120deg, #d0d0d0, #808080);
        border-radius: 0;
      }
    </style>
  </head>
  <body style="margin:0;">
    <figure style="overflow:visible;" id="spinner">
      <div class="spinner"></div>
      <p style="margin-top:0.5em; text-align:center;">
        <strong>Swiftblade</strong>
      </p>
    </figure>
    <div class="emscripten" id="status">Downloading...</div>
    <div class="emscripten">
      <progress class="progress" value="0" max="100" id="progress" hidden=1></progress>
    </div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1 style="display:none;"></canvas>
    
    <textarea class="emscripten" id="output" rows="8" style="display:none;"></textarea>
    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var canvasElement = document.getElementById('canvas');
      var outputElement = document.getElementById('output');
      if (outputElement) outputElement.value = ''; // clear browser cache

      // As a default initial behavior, pop up an alert when webgl context is lost. To make your
      // application robust, you may want to override this behavior before shipping!
      // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
      canvasElement.addEventListener("webglcontextlost", (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      function setStatus(text) {
        if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
        if (text === setStatus.last.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon
        setStatus.last.time = now;
        setStatus.last.text = text;
        if (m) {
          text = m[1];
          progressElement.value = parseInt(m[2])*100;
          progressElement.max = parseInt(m[4])*100;
          progressElement.hidden = false;
          spinnerElement.hidden = false;
        } else {
          progressElement.value = null;
          progressElement.max = null;
        }
        
        if (!text) {
          spinnerElement.hidden = true;
          progressElement.hidden = true;
          canvasElement.style.display = 'block'; // show canvas when done
        }
        statusElement.innerHTML = text;
      }

#if MODULARIZE && !EXPORT_ES6
      var moduleArgs = {
#else
      var Module = {
#endif
        print(...args) {
          // These replacements are necessary if you render to raw HTML
          //text = text.replace(/&/g, "&amp;");
          //text = text.replace(/</g, "&lt;");
          //text = text.replace(/>/g, "&gt;");
          //text = text.replace('\n', '<br>', 'g');
          console.log(...args);
          if (outputElement) {
            var text = args.join(' ');
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight; // focus on bottom
          }
        },
        canvas: canvasElement,
        setStatus: setStatus,
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      setStatus('Downloading...');
      window.onerror = () => {
        setStatus('Exception thrown, see JavaScript console');
        spinnerElement.style.display = 'none';
        setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>
    {{{ SCRIPT }}}
#if MODULARIZE && !EXPORT_ES6
    <script type='text/javascript'>
      {{{ EXPORT_NAME }}}(moduleArgs);
    </script>
#endif
  </body>
</html>
